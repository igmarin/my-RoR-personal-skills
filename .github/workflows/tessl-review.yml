name: Tessl Skill Review

on:
  pull_request:

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: tesslio/setup-tessl@v2
        with:
          token: ${{ secrets.TESSL_TOKEN }}

      - name: Find changed skills
        id: changed
        run: |
          dirs=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep 'SKILL\.md' \
            | xargs -I{} dirname {} \
            | sort -u)
          echo "Found changed skill dirs: $dirs"
          echo "dirs<<EOF" >> $GITHUB_OUTPUT
          echo "$dirs" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Review and Eval changed skills
        if: steps.changed.outputs.dirs != ''
        run: |
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            [ ! -d "$dir" ] && echo "Skipping $dir (directory not found)" && continue
            echo "── Processing $dir ──"

            # 1. Static Review with optimization
            tessl skill review "$dir/SKILL.md" --optimize

            # 2. Dynamic Evaluation
            echo "🧪 Generating evaluation scenario..."
            tessl scenario generate "$dir/SKILL.md" --count=1

            echo "📥 Downloading scenario..."
            tessl scenario download --last

            echo "🚀 Running evaluation..."
            tessl eval run ./evals
            # Cleanup for the next iteration
            rm -rf ./evals/*
          done <<< "${{ steps.changed.outputs.dirs }}"
