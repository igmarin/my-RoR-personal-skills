name: Tessl Tile Publish

on:
  push:
    branches: [main]
    paths:
      - 'build/**'
      - 'skills/**'
      - 'workflows/**'
      - 'docs/**'
      - 'tile.json'
      - 'tessl.json'
      - 'scripts/validate-plugins.sh'
      - '.github/workflows/tessl-publish.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tessl-publish-main
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Validate published inventories
        run: bash scripts/validate-plugins.sh

      - name: Set up Tessl
        uses: tesslio/setup-tessl@v2
        with:
          token: ${{ secrets.TESSL_TOKEN }}

      - name: Publish Tessl tile
        run: tessl tile publish --bump patch --skip-evals .
