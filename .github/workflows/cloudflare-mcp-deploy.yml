name: Deploy Cloudflare MCP

on:
  push:
    branches: [main]
    paths:
      - 'cloudflare_mcp/**'
      - '.github/workflows/cloudflare-mcp-deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'cloudflare_mcp/**'
      - '.github/workflows/cloudflare-mcp-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-mcp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: Security Checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: cloudflare_mcp

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cloudflare_mcp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies for vulnerabilities
        run: npm audit --audit-level=high

      - name: Lint TypeScript code
        run: npm run typecheck

  validate:
    name: Validate Cloudflare MCP
    needs: security
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: cloudflare_mcp

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cloudflare_mcp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

  deploy:
    name: Deploy Cloudflare MCP
    needs: [security, validate]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: cloudflare_mcp

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cloudflare_mcp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy Worker
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run deploy
