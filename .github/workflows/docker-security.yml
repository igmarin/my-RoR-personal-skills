name: Docker Security

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - mcp_server/Gemfile
      - mcp_server/Gemfile.lock
  pull_request:
    paths:
      - Dockerfile
      - mcp_server/Gemfile
      - mcp_server/Gemfile.lock
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday scan — catches newly disclosed CVEs

jobs:
  build-and-scan:
    name: Build & Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # Required to upload SARIF results to GitHub Security tab

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t rails-agent-skills-mcp:${{ github.sha }} .

      - name: Scan with Trivy (SARIF upload)
        uses: aquasecurity/trivy-action@v0.31.0
        with:
          image-ref: rails-agent-skills-mcp:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'          # Fail the build on CRITICAL or HIGH CVEs with a fix available
          ignore-unfixed: true    # Skip CVEs with no fix (e.g. glibc, gnutls28)

      - name: Upload Trivy SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  runtime-hardening-check:
    name: Runtime Hardening Smoke Test
    runs-on: ubuntu-latest
    needs: build-and-scan

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t rails-agent-skills-mcp:${{ github.sha }} .

      - name: Verify container runs as non-root
        run: |
          USER_ID=$(docker run --rm \
            --security-opt no-new-privileges \
            --cap-drop ALL \
            rails-agent-skills-mcp:${{ github.sha }} \
            id -u)
          if [ "$USER_ID" = "0" ]; then
            echo "ERROR: Container is running as root!" && exit 1
          fi
          echo "OK: Running as uid=$USER_ID"

      - name: Verify no-new-privileges enforcement
        run: |
          docker run --rm \
            --security-opt no-new-privileges \
            --cap-drop ALL \
            --read-only \
            --tmpfs /tmp \
            rails-agent-skills-mcp:${{ github.sha }} \
            ruby --version
