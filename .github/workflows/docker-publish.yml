name: Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tags: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: igmarin/rails-agent-skills-mcp
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.31.0
        with:
          image-ref: igmarin/rails-agent-skills-mcp@${{ needs.build-and-push.outputs.image-digest }}
          format: 'table'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true

      - name: Run Trivy scanner (SARIF output)
        if: always()
        uses: aquasecurity/trivy-action@v0.31.0
        with:
          image-ref: igmarin/rails-agent-skills-mcp@${{ needs.build-and-push.outputs.image-digest }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  sbom:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0.24.0
        with:
          image: igmarin/rails-agent-skills-mcp@${{ needs.build-and-push.outputs.image-digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

  sign:
    needs: [build-and-push, security-scan]
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    runs-on: ubuntu-latest
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Sign the published Docker image
        env:
          DIGEST: ${{ needs.build-and-push.outputs.image-digest }}
        run: |
          cosign sign --yes "igmarin/rails-agent-skills-mcp@${DIGEST}"

  publish-mcp-registry:
    needs: [build-and-push, security-scan]
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
          TARBALL="mcp-publisher_${OS}_${ARCH}.tar.gz"
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/${TARBALL}" -o "${TARBALL}"
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/checksums.txt" -o checksums.txt
          grep "${TARBALL}" checksums.txt | sha256sum --check
          tar xz mcp-publisher < "${TARBALL}"
          chmod +x mcp-publisher

      - name: Set server metadata version
        run: |
          version="${GITHUB_REF_NAME#v}"
          VERSION="$version" ruby -rjson -e '
            path = "server.json"
            data = JSON.parse(File.read(path))
            version = ENV.fetch("VERSION")
            package = data.fetch("packages").fetch(0)

            data["version"] = version
            package["identifier"] = "docker.io/igmarin/rails-agent-skills-mcp:#{version}"
            package.delete("version")

            File.write(path, "#{JSON.pretty_generate(data)}\n")
          '
          cat server.json

      - name: Confirm Docker image is published
        run: |
          version="${GITHUB_REF_NAME#v}"
          docker buildx imagetools inspect "docker.io/igmarin/rails-agent-skills-mcp:${version}"

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
