name: Deploy Cloudflare MCP

on:
  push:
    branches: [main]
    paths:
      - 'cloudflare_mcp/**'
      - '.github/workflows/cloudflare-mcp-deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'cloudflare_mcp/**'
      - '.github/workflows/cloudflare-mcp-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-mcp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Cloudflare MCP
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: cloudflare_mcp

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cloudflare_mcp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

  deploy:
    name: Deploy Cloudflare MCP
    needs: validate
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: cloudflare_mcp

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cloudflare_mcp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy Worker
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run deploy
