name: Evaluator Gem

on:
  pull_request:
    paths:
      - 'evaluator/**'
      - '.github/workflows/agent-evaluations.yml'
  push:
    branches: [main]
    paths:
      - 'evaluator/**'
      - '.github/workflows/agent-evaluations.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: evaluator-gem-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: evaluator

      - name: Run evaluator quality gate
        working-directory: evaluator
        run: bundle exec rake

      - name: Verify evaluator package
        working-directory: evaluator
        run: bundle exec rake package:verify
