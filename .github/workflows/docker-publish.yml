name: Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: igmarin/rails-agent-skills-mcp
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-mcp-registry:
    needs: build-and-push
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
          chmod +x mcp-publisher

      - name: Set server metadata version
        run: |
          version="${GITHUB_REF_NAME#v}"
          VERSION="$version" ruby -rjson -e '
            path = "server.json"
            data = JSON.parse(File.read(path))
            version = ENV.fetch("VERSION")
            package = data.fetch("packages").fetch(0)

            data["version"] = version
            package["identifier"] = "docker.io/igmarin/rails-agent-skills-mcp:#{version}"
            package.delete("version")

            File.write(path, "#{JSON.pretty_generate(data)}\n")
          '
          cat server.json

      - name: Confirm Docker image is published
        run: |
          version="${GITHUB_REF_NAME#v}"
          docker buildx imagetools inspect "docker.io/igmarin/rails-agent-skills-mcp:${version}"

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
